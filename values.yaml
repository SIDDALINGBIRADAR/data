# FILE: temporal/values.postgresql.yaml

server:
  replicaCount: 1

  image:
    repository: nexus.uat.finopaymentbank.in:9443/temporalio/server
    tag: "1.29.1"
    pullPolicy: IfNotPresent

  podSecurityContext:
    runAsUser: 1000650000    
    fsGroup: 1000650000       
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  frontend:
    replicaCount: 1
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  history:
    replicaCount: 1
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

  matching:
    replicaCount: 1
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

  worker:
    replicaCount: 1
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  config:
    persistence:
      default:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "baas-uat-db-ha.baas-postgres"
          port: "5432"
          database: temporal
          user: "temporal_user"
          password: "temporal@123"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"

      visibility:
        driver: "sql"
        sql:
          driver: "postgres12"
          host: "baas-uat-db-ha.baas-postgres"
          port: "5432"
          database: temporal_visibility
          user: "temporal_visibility_user"
          password: "visibility_visibility"
          maxConns: 20
          maxIdleConns: 20
          maxConnLifetime: "1h"


web:
  enabled: true
  replicaCount: 1

  image:
    repository: nexus.uat.finopaymentbank.in:9443/temporalio/ui
    tag: "2.42.1"
    pullPolicy: IfNotPresent

  podSecurityContext:
    runAsUser: 1000650000     
    fsGroup: 1000650000       
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  additionalEnv:
    - name: TEMPORAL_CSRF_COOKIE_INSECURE
      value: "true"

admintools:
  enabled: true
  replicaCount: 1

  image:
    repository: nexus.uat.finopaymentbank.in:9443/temporalio/admin-tools
    tag: "1.29.1-tctl-1.18.4-cli-1.5.0"
    pullPolicy: IfNotPresent

  podSecurityContext:
    runAsUser: 1000650000     
    fsGroup: 1000650000       
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

cassandra:
  enabled: false
mysql:
  enabled: false
postgresql:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
elasticsearch:
  enabled: false
schema:
  createDatabase:
    enabled: false
  setup:
    enabled: false
  update:
    enabled: false
